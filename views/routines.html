<section class="routines">
  <div class="input-row">
    <input type="text" placeholder="Add new task" />
    <button><i class="fa-solid fa-plus"></i>Add Task</button>
  </div>

  <hr />

  <div class="filters-row">
    <div class="filter-group">
      <span>Category</span>
      <div class="custom-select" id="categorySelect">
        <div class="select-trigger"><span>Personal</span></div>
        <div class="select-options">
          <div class="option" data-value="personal">Personal</div>
          <div class="option" data-value="work">Work</div>
          <div class="option" data-value="shopping">Shopping</div>
          <div class="option" data-value="other">Other</div>
        </div>
      </div>
    </div>

    <div class="filter-group">
      <span>Priority</span>
      <div class="custom-select" id="prioritySelect">
        <div class="select-trigger"><span>Medium</span></div>
        <div class="select-options">
          <div class="option" data-value="low">Low</div>
          <div class="option" data-value="medium">Medium</div>
          <div class="option" data-value="high">High</div>
          <div class="option" data-value="hard">Hard</div>
        </div>
      </div>
    </div>

    <div class="filter-group">
      <span>Due Date</span>
      <div class="date-wrapper">
        <input type="date" id="taskDate" value="2026-03-08" />
      </div>
    </div>
  </div>
</section>

<div class="filter-stats-row">
  <div class="filter-section">
    <span class="filter-label">Filters:</span>
    <div class="filter-selects-group">
      <!-- Task Status Custom Select -->
      <div class="custom-select filter-custom-select" id="taskStatusSelect">
        <div class="select-trigger"><span>All Tasks</span></div>
        <div class="select-options">
          <div class="option" data-value="all">All Tasks</div>
          <div class="option" data-value="active">Active</div>
          <div class="option" data-value="completed">Completed</div>
        </div>
      </div>

      <!-- Category Filter Custom Select -->
      <div class="custom-select filter-custom-select" id="categoryFilterSelect">
        <div class="select-trigger"><span>All Categories</span></div>
        <div class="select-options">
          <div class="option" data-value="all">All Categories</div>
          <div class="option" data-value="personal">Personal</div>
          <div class="option" data-value="work">Work</div>
          <div class="option" data-value="shopping">Shopping</div>
          <div class="option" data-value="other">Other</div>
        </div>
      </div>

      <!-- Priority Filter Custom Select -->
      <div class="custom-select filter-custom-select" id="priorityFilterSelect">
        <div class="select-trigger"><span>All Priorities</span></div>
        <div class="select-options">
          <div class="option" data-value="all">All Priorities</div>
          <div class="option" data-value="low">Low</div>
          <div class="option" data-value="medium">Medium</div>
          <div class="option" data-value="high">High</div>
          <div class="option" data-value="hard">Hard</div>
        </div>
      </div>
    </div>
  </div>

  <div class="stats-group">
    <div class="stat-badge">
      <span class="stat-number total"></span>
      <span>4</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-badge">
      <span class="stat-number completed"></span>
      <span>1</span>
      <span class="stat-label">Completed</span>
    </div>
    <div class="stat-badge">
      <span class="stat-number active"></span>
      <span>3</span>
      <span class="stat-label">Active</span>
    </div>
  </div>
</div>

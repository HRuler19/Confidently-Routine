<section class="settings-page">
  <!-- Edit Profile Section -->
  <div class="settings-card">
    <h2 class="settings-title" data-i18n="settings.edit_profile_title">Edit profile</h2>

    <div class="settings-profile-content">
      <!-- Column 1: Current Avatar -->
      <div class="settings-avatar-section">
        <div class="settings-avatar-label" data-i18n="settings.current_avatar_label">Current Avatar</div>
        <div class="settings-current-avatar">
          <img
            id="settingsCurrentAvatar"
            src="assets/images/Boy image 1.svg"
            alt="Current Avatar"
          />
        </div>
      </div>

      <!-- Column 2: Choose New Avatar -->
      <div class="settings-avatar-choose">
        <div class="settings-avatar-label" data-i18n="settings.choose_new_avatar_label">Choose new Avatar</div>
        <div class="settings-avatar-grid">
          <div
            class="settings-avatar-option"
            data-avatar="assets/images/Boy image 1.svg"
          >
            <img src="assets/images/Boy image 1.svg" alt="Avatar 1" />
          </div>
          <div
            class="settings-avatar-option"
            data-avatar="assets/images/Boy image 2.svg"
          >
            <img src="assets/images/Boy image 2.svg" alt="Avatar 2" />
          </div>
          <div
            class="settings-avatar-option"
            data-avatar="assets/images/Girl image 1.svg"
          >
            <img src="assets/images/Girl image 1.svg" alt="Avatar 3" />
          </div>
          <div
            class="settings-avatar-option"
            data-avatar="assets/images/Girl image 2.svg"
          >
            <img src="assets/images/Girl image 2.svg" alt="Avatar 4" />
          </div>
          <div
            class="settings-avatar-option settings-avatar-upload"
            id="settingsUploadAvatar"
          >
            <i class="fa-solid fa-plus"></i>
          </div>
          <input
            type="file"
            id="settingsAvatarUpload"
            accept="image/*"
            style="display: none"
          />
        </div>
      </div>

      <!-- Column 3: Username & Password Form -->
      <div class="settings-form-section">
        <div class="settings-form-group">
          <label data-i18n="settings.current_username_label">Current Username:</label>
          <input type="text" id="settingsCurrentUsername" readonly />
        </div>
        <div class="settings-form-group">
          <label data-i18n="settings.current_password_label">Current Password:</label>
          <input
            type="password"
            id="settingsCurrentPassword"
            readonly
            value="********"
          />
        </div>
        <div class="settings-form-group">
          <label data-i18n="settings.new_username_label">New Username:</label>
          <input
            type="text"
            id="settingsNewUsername"
            placeholder="Enter new username"
            data-i18n-placeholder="settings.new_username_placeholder"
          />
        </div>
        <div class="settings-form-group">
          <label data-i18n="settings.new_password_label">New Password:</label>
          <input
            type="password"
            id="settingsNewPassword"
            placeholder="Enter new password"
            data-i18n-placeholder="settings.new_password_placeholder"
          />
        </div>
        <button class="settings-save-btn" id="settingsSaveBtn">
          <i class="fa-solid fa-check"></i>
          <span data-i18n="common.save">Save</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Theme & Language Section -->
  <div class="settings-card">
    <h2 class="settings-title" data-i18n="settings.theme_language_title">Change theme and language</h2>

    <div class="settings-options-row">
      <div class="settings-option-group">
        <label data-i18n="settings.choose_theme_label">Choose theme:</label>
        <div class="custom-select settings-custom-select" id="themeSelect" data-value="light">
          <div class="select-trigger">
            <span>Light mode</span>
            <i class="fa-solid fa-chevron-down"></i>
          </div>
          <div class="select-options">
            <div class="option" data-value="light" data-i18n="settings.theme_light">Light mode</div>
            <div class="option" data-value="dark" data-i18n="settings.theme_dark">Dark mode</div>
          </div>
        </div>
      </div>

      <div class="settings-option-group">
        <label data-i18n="settings.choose_language_label">Choose language:</label>
        <div class="custom-select settings-custom-select" id="languageSelect" data-value="en">
          <div class="select-trigger">
            <span>English</span>
            <i class="fa-solid fa-chevron-down"></i>
          </div>
          <div class="select-options">
            <div class="option" data-value="en">English</div>
            <div class="option" data-value="tk">Türkmençe</div>
            <div class="option" data-value="ru">Русский</div>
            <div class="option" data-value="tr">Türkçe</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

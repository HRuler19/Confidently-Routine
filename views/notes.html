<!-- Add Note Section -->
<section class="notes-add-section">
  <div class="notes-add-wrapper">
    <div class="notes-textarea-container">
      <textarea id="noteContent" placeholder="Add new note here" data-i18n-placeholder="notes.add_placeholder"></textarea>
    </div>
    <div class="notes-form-sidebar">
      <button id="addNoteBtn" class="btn-add-note" disabled>
        <i class="fa-solid fa-plus"></i>
        <span data-i18n="notes.add_button">Add Note</span>
      </button>
      <div class="form-field">
        <label data-i18n="notes.date_label">Date</label>
        <div class="input-with-icon">
          <input type="text" id="noteDate" placeholder="mm/dd/yyyy" data-i18n-placeholder="notes.date_placeholder" />
          <i class="fa-regular fa-calendar"></i>
        </div>
      </div>
      <div class="form-field">
        <label data-i18n="notes.category_label">Category</label>
        <div class="custom-select" id="noteCategory" data-value="study">
          <div class="select-trigger"><span>Study</span></div>
          <div class="select-options">
            <div class="option" data-value="study" data-i18n="notes.category_study">Study</div>
            <div class="option" data-value="work" data-i18n="notes.category_work">Work</div>
            <div class="option" data-value="personal" data-i18n="notes.category_personal">Personal</div>
            <div class="option" data-value="learning" data-i18n="notes.category_learning">Learning</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Filters Section -->
<div class="filter-stats-row">
  <div class="filter-section">
    <span class="filter-label" data-i18n="notes.filters_label">Filters:</span>
    <div class="filter-selects-group">
      <div class="custom-select filter-custom-select" id="noteFilter" data-value="all">
        <div class="select-trigger"><span>All Notes</span></div>
        <div class="select-options">
          <div class="option" data-value="all" data-i18n="notes.sort_all">All Notes</div>
          <div class="option" data-value="recent" data-i18n="notes.sort_recent">Recent</div>
          <div class="option" data-value="oldest" data-i18n="notes.sort_oldest">Oldest</div>
        </div>
      </div>
      <div class="custom-select filter-custom-select" id="categoryFilter" data-value="all">
        <div class="select-trigger"><span>All Categories</span></div>
        <div class="select-options">
          <div class="option" data-value="all" data-i18n="notes.filter_all_categories">All Categories</div>
          <div class="option" data-value="study" data-i18n="notes.category_study">Study</div>
          <div class="option" data-value="work" data-i18n="notes.category_work">Work</div>
          <div class="option" data-value="personal" data-i18n="notes.category_personal">Personal</div>
          <div class="option" data-value="learning" data-i18n="notes.category_learning">Learning</div>
        </div>
      </div>
    </div>
  </div>
  <div class="stats-group">
    <div class="stat-badge">
      <span class="stat-number total"></span>
      <span id="notesCount">0</span>
      <span class="stat-label" data-i18n="notes.stat_total">Total</span>
    </div>
  </div>
</div>

<!-- Notes List -->
<div class="notes-list" id="notesList">
  <!-- Notes will be dynamically inserted here -->
</div>

<!-- Delete Note Modal -->
<div class="modal" id="deleteNoteModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon-wrapper">
        <i class="fa-solid fa-trash-can"></i>
      </div>
    </div>
    <div class="modal-body">
      <h2 data-i18n="notes.delete_modal_title">Delete Note</h2>
      <p data-i18n="notes.delete_modal_body">Are you sure you want to delete this note?</p>
      <p class="modal-note-title"></p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" id="cancelDeleteNote" data-i18n="common.cancel">Cancel</button>
      <button class="modal-btn modal-btn-confirm" id="confirmDeleteNote" data-i18n="common.confirm_delete">Yes, delete</button>
    </div>
  </div>
</div>

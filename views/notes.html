<!-- Add Note Section -->
<section class="notes-add-section">
  <div class="notes-add-wrapper">
    <div class="notes-textarea-container">
      <textarea id="noteContent" placeholder="Add new note here"></textarea>
    </div>
    <div class="notes-form-sidebar">
      <button id="addNoteBtn" class="btn-add-note" disabled>
        <i class="fa-solid fa-plus"></i>
        <span>Add Note</span>
      </button>
      <div class="form-field">
        <label>Date</label>
        <div class="input-with-icon">
          <input type="text" id="noteDate" placeholder="mm/dd/yyyy" />
          <i class="fa-regular fa-calendar"></i>
        </div>
      </div>
      <div class="form-field">
        <label>Category</label>
        <div class="custom-select" id="noteCategory">
          <div class="select-trigger"><span>Study</span></div>
          <div class="select-options">
            <div class="option" data-value="study">Study</div>
            <div class="option" data-value="work">Work</div>
            <div class="option" data-value="personal">Personal</div>
            <div class="option" data-value="learning">Learning</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Filters Section -->
<div class="filter-stats-row">
  <div class="filter-section">
    <span class="filter-label">Filters:</span>
    <div class="filter-selects-group">
      <div class="custom-select filter-custom-select" id="noteFilter">
        <div class="select-trigger"><span>All Notes</span></div>
        <div class="select-options">
          <div class="option" data-value="all">All Notes</div>
          <div class="option" data-value="recent">Recent</div>
          <div class="option" data-value="oldest">Oldest</div>
        </div>
      </div>
      <div class="custom-select filter-custom-select" id="categoryFilter">
        <div class="select-trigger"><span>All Categories</span></div>
        <div class="select-options">
          <div class="option" data-value="all">All Categories</div>
          <div class="option" data-value="study">Study</div>
          <div class="option" data-value="work">Work</div>
          <div class="option" data-value="personal">Personal</div>
          <div class="option" data-value="learning">Learning</div>
        </div>
      </div>
    </div>
  </div>
  <div class="stats-group">
    <div class="stat-badge">
      <span class="stat-number total"></span>
      <span id="notesCount">0</span>
      <span class="stat-label">Total</span>
    </div>
  </div>
</div>

<!-- Notes List -->
<div class="notes-list" id="notesList">
  <!-- Notes will be dynamically inserted here -->
</div>

<!-- Delete Note Modal -->
<div class="modal" id="deleteNoteModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-icon-wrapper">
        <i class="fa-solid fa-trash-can"></i>
      </div>
    </div>
    <div class="modal-body">
      <h2>Delete Note</h2>
      <p>Are you sure you want to delete this note?</p>
      <p class="modal-note-title"></p>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" id="cancelDeleteNote">Cancel</button>
      <button class="modal-btn modal-btn-confirm" id="confirmDeleteNote">Yes, delete</button>
    </div>
  </div>
</div>

# Desktop release pipeline: pushing a version tag (v*) builds the Tauri
# bundles on real Windows and macOS runners and attaches them to the
# GitHub release for that tag - no local Mac needed for the .dmg.
#
# Android is intentionally NOT built here: the signed release APK needs
# the upload keystore, which stays on the developer machine
# (see src-tauri/gen/android/keystore.properties) - build it locally with
# `bun run dist:android` and upload it to the release.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  desktop:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Single universal binary covering Apple Silicon + Intel
          - platform: macos-latest
            args: --target universal-apple-darwin
            targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Confidently Routine ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

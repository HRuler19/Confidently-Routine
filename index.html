<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Confidently-Routine</title>
    <link rel="icon" type="image/svg+xml" href="/images/Logo Confidently Routine.svg" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
    <meta name="theme-color" content="#0e5e0a" />

    <!-- Apply the persisted theme before first paint to avoid a light flash -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem("confidently_theme");
          if (theme !== "light" && theme !== "dark") theme = "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>

    <!-- Fonts and icons are bundled (fontsource + lucide-solid); no CDN
         requests, so the packaged apps work fully offline. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>

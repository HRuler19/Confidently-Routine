<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confidently-Routine</title>

    <script>
      (function () {
        try {
          var theme = localStorage.getItem("confidently_theme");
          if (theme !== "light" && theme !== "dark") theme = "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>

    <link rel="stylesheet" href="/assets/css/base/theme.css" />
    <link rel="stylesheet" href="/assets/css/base/style.css" />
    <link rel="stylesheet" href="/assets/css/pages/dashboard.css" />
    <link rel="stylesheet" href="/assets/css/layouts/header.css" />
    <link rel="stylesheet" href="/assets/css/layouts/sidebar.css" />
    <link rel="stylesheet" href="/assets/css/pages/login.css" />
    <link rel="stylesheet" href="/assets/css/pages/routine.css" />
    <link rel="stylesheet" href="/assets/css/pages/my-routine.css" />
    <link rel="stylesheet" href="/assets/css/pages/notes.css" />
    <link rel="stylesheet" href="/assets/css/pages/settings.css" />
    <link rel="stylesheet" href="/assets/css/components/modal.css" />
    <link rel="stylesheet" href="/assets/css/components/mobile-nav.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />

    <!-- Flatpickr CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"
    />
  </head>

  <body>
    <div id="app">
      <!-- Header -->
      <div class="header" id="mainHeader">
        <div class="headerLeft">
          <div>
            <img
              id="appLogo"
              src="/assets/images/Logo Confidently Routine.svg"
              alt=""
            />
          </div>
          <div data-i18n="header.brand">Confidently Routine</div>
        </div>

        <div class="headerRight">
          <button class="hamburger-menu" id="hamburgerBtn">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div
            class="custom-select lang-select"
            id="headerLanguageSelect"
            data-i18n-aria-label="header.language_switcher"
          >
            <div class="select-trigger"><span>EN</span></div>
            <div class="select-options">
              <div class="option" data-value="en" data-code="EN">English</div>
              <div class="option" data-value="tk" data-code="TM">Türkmençe</div>
              <div class="option" data-value="ru" data-code="RU">Русский</div>
              <div class="option" data-value="tr" data-code="TR">Türkçe</div>
            </div>
          </div>

          <div id="welcomeMessage">Cholukov Hangeldi</div>

          <div class="avatar" id="headerAvatar">
            <img src="/assets/images/Boy image 1.svg" alt="" />
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div id="sidebar">
        <a href="#" data-page="dashboard">
          <div class="menu-item">
            <div><i class="fa-solid fa-house"></i></div>
            <div class="dashboard" data-i18n="nav.dashboard">Dashboard</div>
          </div>
        </a>

        <a href="#" data-page="my-routine">
          <div class="menu-item">
            <div><i class="fa-solid fa-list-check"></i></div>
            <div class="myRoutine" data-i18n="nav.my_routine">My routine</div>
          </div>
        </a>

        <a href="#" data-page="routines">
          <div class="menu-item">
            <div><i class="fa-regular fa-calendar"></i></div>
            <div class="myRoutine" data-i18n="nav.daily_tasks">Daily tasks</div>
          </div>
        </a>

        <a href="#" data-page="notes">
          <div class="menu-item">
            <div><i class="fa-regular fa-pen-to-square"></i></div>
            <div class="notes" data-i18n="nav.notes">Notes</div>
          </div>
        </a>

        <a href="#" data-page="settings">
          <div class="menu-item">
            <div><i class="fa-solid fa-gear"></i></div>
            <div class="settings" data-i18n="nav.settings">Settings</div>
          </div>
        </a>

        <a href="#" id="logoutBtn">
          <div class="menu-item">
            <div><i class="fa-solid fa-sign-out-alt"></i></div>
            <div class="logout" data-i18n="nav.logout">Logout</div>
          </div>
        </a>
      </div>

      <!-- Mobile Bottom Navigation -->
      <div class="mobile-bottom-nav" id="mobileBottomNav">
        <svg
          class="mobile-nav-bg"
          viewBox="0 0 100 92"
          preserveAspectRatio="none"
          aria-hidden="true"
        >
          <path
            class="mobile-nav-bg-fill"
            d="M0,7 Q50,31 100,7 L100,92 L0,92 Z"
          />
          <path class="mobile-nav-bg-line" d="M0,7 Q50,31 100,7" />
          <path class="mobile-nav-bg-line" d="M0,52 Q50,76 100,52" />
          <!-- Active-tab indicator: five exact segments of the hairline
               parabola above (one per tab); CSS shows only the active one,
               so the green bar always rides the curved line. -->
          <path class="mobile-nav-bg-active seg-0" d="M5.5,54.49 Q10,56.42 14.5,57.95" />
          <path class="mobile-nav-bg-active seg-1" d="M25.5,61.12 Q30,62.18 34.5,62.85" />
          <path class="mobile-nav-bg-active seg-2" d="M45.5,63.9 Q50,64.1 54.5,63.9" />
          <path class="mobile-nav-bg-active seg-3" d="M65.5,62.85 Q70,62.18 74.5,61.12" />
          <path class="mobile-nav-bg-active seg-4" d="M85.5,57.95 Q90,56.42 94.5,54.49" />
        </svg>
        <div class="mobile-nav-items">
          <a
            href="#"
            data-page="dashboard"
            class="mobile-nav-item"
            data-i18n-aria-label="nav.dashboard"
          >
            <i class="fa-solid fa-house"></i>
            <span class="mobile-nav-item-label" data-i18n="nav.dashboard">Dashboard</span>
          </a>
          <a
            href="#"
            data-page="my-routine"
            class="mobile-nav-item"
            data-i18n-aria-label="nav.my_routine"
          >
            <i class="fa-solid fa-list-check"></i>
            <span class="mobile-nav-item-label" data-i18n="nav.my_routine">My routine</span>
          </a>
          <a
            href="#"
            data-page="routines"
            class="mobile-nav-item"
            data-i18n-aria-label="nav.routine_short"
          >
            <i class="fa-regular fa-calendar"></i>
            <span class="mobile-nav-item-label" data-i18n="nav.routine_short">Routine</span>
          </a>
          <a
            href="#"
            data-page="notes"
            class="mobile-nav-item"
            data-i18n-aria-label="nav.notes"
          >
            <i class="fa-regular fa-pen-to-square"></i>
            <span class="mobile-nav-item-label" data-i18n="nav.notes">Notes</span>
          </a>
          <a
            href="#"
            data-page="settings"
            class="mobile-nav-item"
            data-i18n-aria-label="nav.settings"
          >
            <i class="fa-solid fa-gear"></i>
            <span class="mobile-nav-item-label" data-i18n="nav.settings">Settings</span>
          </a>
        </div>
        <div class="mobile-nav-active-label" id="mobileNavActiveLabel"></div>
      </div>

      <!-- Page Content -->
      <main id="content"></main>

      <!-- LOGOUT MODAL -->
      <div class="modal" id="logoutModal">
        <div class="modal-content">
          <div class="modal-header">
            <div class="modal-icon-wrapper">
              <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </div>
          </div>
          <div class="modal-body">
            <h2 data-i18n="logout_modal.title">Ready to leave?</h2>
            <p data-i18n="logout_modal.body">
              Are you sure you want to log out of your account?
            </p>
          </div>
          <div class="modal-footer">
            <button class="modal-btn modal-btn-cancel" id="cancelLogout" data-i18n="common.cancel">
              Cancel
            </button>
            <button class="modal-btn modal-btn-confirm" id="confirmLogout" data-i18n="logout_modal.confirm">
              Yes, log out
            </button>
          </div>
        </div>
      </div>

      <!-- LOGIN Page -->
      <section class="login-section" id="loginSection">
        <div class="login-container">
          <div class="login-wrapper">
            <!-- Header Section -->
            <header class="login-header">
              <div class="login-header__content">
                <div class="login-logo">
                  <img
                    src="assets/images/Logo Confidently Routine.svg"
                    alt="Confidently Routine"
                    class="login-logo__image"
                  />
                </div>
                <h1 class="login-title" data-i18n="header.brand">Confidently Routine</h1>
                <p class="login-description" data-i18n="login.subtitle">Enter your login credentials</p>
              </div>
              <div
                class="login-avatar"
                role="button"
                tabindex="0"
                aria-label="Select main avatar"
                data-i18n-aria-label="login.select_main_avatar"
                id="mainAvatarSelector"
              >
                <img
                  src="assets/images/Boy image 1.svg"
                  alt="Main avatar"
                  class="login-avatar__image"
                  id="mainAvatarImg"
                />
              </div>
            </header>

            <!-- Main Content -->
            <main class="login-main">
              <!-- Avatar Selection -->
              <div
                class="avatar-list"
                role="group"
                aria-label="Available avatars"
                data-i18n-aria-label="login.available_avatars"
              >
                <div
                  class="avatar avatar--1"
                  role="button"
                  tabindex="0"
                  aria-label="Select avatar 1"
                  data-i18n-aria-label="login.select_avatar"
                  data-i18n-vars='{"n":1}'
                  data-avatar="1"
                >
                  <img
                    src="assets/images/Boy image 1.svg"
                    alt="Avatar option 1"
                  />
                </div>
                <div
                  class="avatar avatar--2"
                  role="button"
                  tabindex="0"
                  aria-label="Select avatar 2"
                  data-i18n-aria-label="login.select_avatar"
                  data-i18n-vars='{"n":2}'
                  data-avatar="2"
                >
                  <img
                    src="assets/images/Girl image 1.svg"
                    alt="Avatar option 2"
                  />
                </div>
                <div
                  class="avatar avatar--3"
                  role="button"
                  tabindex="0"
                  aria-label="Select avatar 3"
                  data-i18n-aria-label="login.select_avatar"
                  data-i18n-vars='{"n":3}'
                  data-avatar="3"
                >
                  <img
                    src="assets/images/Boy image 2.svg"
                    alt="Avatar option 3"
                  />
                </div>
                <div
                  class="avatar avatar--4"
                  role="button"
                  tabindex="0"
                  aria-label="Select avatar 4"
                  data-i18n-aria-label="login.select_avatar"
                  data-i18n-vars='{"n":4}'
                  data-avatar="4"
                >
                  <img
                    src="assets/images/Girl image 2.svg"
                    alt="Avatar option 4"
                  />
                </div>
                <div
                  class="avatar avatar--add"
                  role="button"
                  tabindex="0"
                  aria-label="Add new avatar"
                  data-i18n-aria-label="login.add_new_avatar"
                  id="addAvatarBtn"
                >
                  <i class="fa-solid fa-plus" aria-hidden="true"></i>
                </div>
              </div>

              <!-- Hidden file input -->
              <input
                type="file"
                id="avatarUpload"
                accept="image/*"
                style="display: none"
              />

              <!-- Login Form -->
              <form class="login-form" id="loginForm" novalidate>
                <div class="form-fields">
                  <!-- Username Field -->
                  <div class="form-group">
                    <label for="username" class="form-label" data-i18n="login.username_label">Username</label>
                    <div class="input-wrapper">
                      <i
                        class="fa-solid fa-user input-icon"
                        aria-hidden="true"
                      ></i>
                      <input
                        type="text"
                        id="username"
                        class="input-field input-field--username"
                        placeholder="Enter your Username"
                        data-i18n-placeholder="login.username_placeholder"
                        required
                      />
                    </div>
                  </div>

                  <!-- Password Field -->
                  <div class="form-group form-group--password">
                    <label for="password" class="form-label" data-i18n="login.password_label">Password</label>
                    <div class="input-password-wrapper">
                      <span class="input-password-icon" aria-hidden="true">
                        <i class="fa-solid fa-lock"></i>
                      </span>
                      <input
                        type="password"
                        id="password"
                        class="input-field input-field--password"
                        placeholder="Enter your Password"
                        data-i18n-placeholder="login.password_placeholder"
                        required
                      />
                      <button
                        type="button"
                        class="password-toggle"
                        aria-label="Toggle password visibility"
                        data-i18n-aria-label="login.toggle_password"
                      >
                        <i
                          class="fa-regular fa-eye-slash"
                          aria-hidden="true"
                        ></i>
                      </button>
                    </div>
                  </div>
                </div>

                <!-- Remember Me Checkbox -->
                <div class="checkbox-wrapper">
                  <input
                    type="checkbox"
                    id="remember-me"
                    class="checkbox-input"
                  />
                  <label for="remember-me" class="checkbox-label" data-i18n="login.remember_me">
                    Remember me
                  </label>
                </div>

                <!-- Submit Button -->
                <div class="submit-wrapper">
                  <button type="submit" class="button button--submit" data-i18n="login.submit">
                    Submit
                  </button>
                </div>
              </form>
            </main>
          </div>
        </div>
      </section>
    </div>

    <!-- Language dictionary + i18n runtime (must load before anything that translates) -->
    <script src="/assets/js/utils/translations.js"></script>
    <script src="/assets/js/utils/i18n.js"></script>
    <script src="/assets/js/utils/theme.js"></script>
    <script src="/assets/js/utils/mobile-nav.js"></script>
    <!-- Main app script -->
    <script src="dist/js/bundle.js" type="module"></script>
    <!-- Shared DOM helpers (custom selects, flatpickr config, confirm modals) -->
    <script src="/assets/js/utils/dom-helpers.js"></script>
    <!-- Shared chart renderers (bar chart, progress ring) -->
    <script src="/assets/js/utils/charts.js"></script>
    <!-- Module scripts -->
    <script src="/assets/js/modules/dashboard/dashboard.js"></script>
    <script src="/assets/js/modules/my-routine/my-routine.js"></script>
    <script src="/assets/js/modules/routines/routines.js"></script>
    <script src="/assets/js/modules/notes/notes.js"></script>
    <script src="/assets/js/modules/settings/settings.js"></script>
    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  </body>
</html>
